<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>✏️ Редактирование записи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-4">
    <div class="container" style="max-width: 600px;">
        <h3 class="mb-4">✏️ Редактирование: {{ record.full_name }}</h3>
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        <form method="post" class="card p-4">
            {% csrf_token %}
            <div class="mb-3"><label class="form-label">ФИО</label><input name="full_name" class="form-control" value="{{ record.full_name }}" required></div>
            <div class="mb-3"><label class="form-label">Группа</label><input name="group_number" class="form-control" value="{{ record.group_number }}" required></div>
            <div class="mb-3"><label class="form-label">Предмет</label><input name="subject" class="form-control" value="{{ record.subject }}" required></div>
            <div class="mb-3"><label class="form-label">Оценка</label><input name="grade" type="number" min="2" max="5" class="form-control" value="{{ record.grade }}" required></div>
            <div class="mb-3"><label class="form-label">Дата (ДД-ММ-ГГГГ)</label><input name="date" class="form-control" value="{{ record.date }}" pattern="\d{2}-\d{2}-\d{4}" required></div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">💾 Сохранить</button>
                <a href="{% url 'db_list' %}" class="btn btn-secondary">❌ Отмена</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
