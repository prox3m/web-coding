<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Ввод данных</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-4">
    <div class="container">
        <h2 class="mb-4 text-center">📝 Ввод и загрузка данных</h2>
        
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="row g-4">
            <!-- ФОРМА ВВОДА -->
            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="mb-3">💾 Сохранить в...</h4>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <div class="d-grid mt-3">
                            <button type="submit" name="save_data" class="btn btn-primary">Сохранить данные</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- ЗАГРУЗКА ФАЙЛА -->
            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="mb-3">📤 Загрузить файл</h4>
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Выберите .json или .xml</label>
                            <input type="file" name="file" class="form-control" accept=".json,.xml" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" name="upload_file" class="btn btn-success">Загрузить на сервер</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-3 mt-4">
            <a href="{% url 'file_list' %}" class="btn btn-outline-secondary">📁 Просмотр файлов</a>
            <a href="{% url 'db_list' %}" class="btn btn-outline-primary">🗄️ Просмотр БД</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
