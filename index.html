<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метеоритный дождь</title>

    <style>
        body {
            margin: 0; overflow: hidden; background: #000; font-family: system-ui, sans-serif;
        }
        canvas {
            display: block;
        }
        #hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.75);
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 20px;
            pointer-events: none;
            user-select: none;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div id="hint">Наведите курсор на метеор или его след, чтобы ускорить</div>
    <canvas id="sky"></canvas>

    <script>
        const canvas = document.getElementById('sky');
        const ctx = canvas.getContext('2d');
        let width, height;
        let mouseX = -1000, mouseY = -1000;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        canvas.addEventListener('mouseleave', () => {
            mouseX = -1000; mouseY = -1000;
        });

        let stars = [];
        function initStars() {
            stars = [];
            for(let i = 0; i < 300; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 1.5 + 0.5,
                    baseAlpha: Math.random() * 0.6 + 0.2,
                    twinkleSpeed: Math.random() * 0.003 + 0.001
                });
            }
        }

        class Meteor {
            constructor() { this.reset(); }
            
            reset() {
                const fromTop = Math.random() > 0.5;
                this.x = fromTop ? Math.random() * width : -80;
                this.y = fromTop ? -80 : Math.random() * height * 0.6;
                
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.25;
                this.baseSpeed = 3 + Math.random() * 4;
                this.speed = this.baseSpeed;
                this.hovered = false;
                this.trail = [];
                this.maxTrail = 35;
            }

            update() {
                this.speed = this.hovered ? this.baseSpeed * 2.8 : this.baseSpeed;
                
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                this.trail.unshift({x: this.x, y: this.y});
                if(this.trail.length > this.maxTrail) this.trail.pop();

                if(this.x > width + 150 || this.y > height + 150) this.reset();
            }

            draw() {
                if(this.trail.length < 2) return;

                // Внешнее свечение хвоста
                ctx.beginPath();
                ctx.moveTo(this.trail[0].x, this.trail[0].y);
                for(let i = 1; i < this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
                ctx.strokeStyle = this.hovered ? 'rgba(255, 80, 40, 0.2)' : 'rgba(200, 220, 255, 0.15)';
                ctx.lineWidth = 12;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();

                for(let i = 0; i < this.trail.length - 1; i++) {
                    const p1 = this.trail[i];
                    const p2 = this.trail[i+1];
                    const progress = i / this.trail.length;
                    const alpha = Math.pow(1 - progress, 2);
                    
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = `rgba(255, ${230 - progress*100}, ${180 - progress*120}, ${alpha})`;
                    ctx.lineWidth = (1 - progress) * 6;
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, 3.5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.shadowColor = this.hovered ? '#ff3300' : '#ffaa33';
                ctx.shadowBlur = this.hovered ? 30 : 18;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        const meteors = [];
        for(let i = 0; i < 16; i++) meteors.push(new Meteor());

        function animate(time) {
            const grad = ctx.createLinearGradient(0, 0, 0, height);
            grad.addColorStop(0, '#04060f');
            grad.addColorStop(0.7, '#0b1229');
            grad.addColorStop(1, '#151d38');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            for(let s of stars) {
                const flicker = Math.sin(time * s.twinkleSpeed) * 0.35 + 0.65;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.baseAlpha * flicker})`;
                ctx.fill();
            }

            for(let m of meteors) {
                m.hovered = false;
                const hitRadius = 40;
                for(let p of m.trail) {
                    if(Math.hypot(p.x - mouseX, p.y - mouseY) < hitRadius) {
                        m.hovered = true;
                        break;
                    }
                }
                m.update();
                m.draw();
            }

            requestAnimationFrame(animate);
        }

        resize();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
